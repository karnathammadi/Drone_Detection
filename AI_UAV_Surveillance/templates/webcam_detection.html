{% extends "base.html" %}
{% block content %}
<header class="page-head"><div><p class="eyebrow">Live Camera Mode</p><h1>Real-Time Webcam Detection</h1></div></header>
<section class="panel">
  <div class="toolbar">
    <button class="btn btn-success" onclick="startCamera()"><i class="fa-solid fa-camera"></i> Start Camera</button>
    <button class="btn btn-danger" onclick="stopCamera()"><i class="fa-solid fa-stop"></i> Stop Camera</button>
    <button class="btn btn-secondary" onclick="snapshot()"><i class="fa-solid fa-camera-retro"></i> Snapshot</button>
  </div>
  <img id="cameraFeed" class="camera-feed mt-3" alt="Live detection feed">
  <canvas id="snapshotCanvas" class="d-none"></canvas>
</section>
{% endblock %}
