<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UAV Sentinel Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="login-screen">
  <section class="login-panel">
    <div class="brand login-brand"><span class="brand-mark"><i class="fa-solid fa-shield-halved"></i></span><span>UAV Sentinel</span></div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    <form method="post">
      <label class="form-label">Username</label>
      <input class="form-control" name="username" value="admin" required>
      <label class="form-label mt-3">Password</label>
      <input class="form-control" type="password" name="password" value="admin123" required>
      <button class="btn btn-primary w-100 mt-4"><i class="fa-solid fa-lock"></i> Access Console</button>
    </form>
  </section>
</body>
</html>
