{% extends "base.html" %}
{% block content %}
<header class="page-head"><div><p class="eyebrow">System Controls</p><h1>Settings</h1></div></header>
<section class="panel narrow-panel">
  <form method="post">
    <label class="form-label">Confidence Threshold</label>
    <input class="form-range" type="range" name="confidence_threshold" min="0.6" max="0.95" step="0.01" value="{{ settings.confidence_threshold }}" oninput="thresholdValue.textContent=this.value">
    <div class="metric-readout" id="thresholdValue">{{ settings.confidence_threshold }}</div>
    <div class="form-check form-switch mt-3"><input class="form-check-input" type="checkbox" name="voice_enabled" {% if settings.voice_enabled == '1' %}checked{% endif %}><label class="form-check-label">Voice Alerts</label></div>
    <div class="form-check form-switch"><input class="form-check-input" type="checkbox" name="siren_enabled" {% if settings.siren_enabled == '1' %}checked{% endif %}><label class="form-check-label">Siren Alerts</label></div>
    <div class="form-check form-switch"><input class="form-check-input" type="checkbox" name="email_enabled" {% if settings.email_enabled == '1' %}checked{% endif %}><label class="form-check-label">Email Alerts</label></div>
    <div class="row g-3 mt-2">
      <div class="col-md-6"><label class="form-label">Email Address</label><input class="form-control" name="email_address" value="{{ settings.email_address }}"></div>
      <div class="col-md-6"><label class="form-label">Email Password</label><input class="form-control" type="password" name="email_password" value="{{ settings.email_password }}"></div>
      <div class="col-md-6"><label class="form-label">Notify To</label><input class="form-control" name="email_to" value="{{ settings.email_to }}"></div>
      <div class="col-md-8"><label class="form-label">SMTP Server</label><input class="form-control" name="smtp_server" value="{{ settings.smtp_server }}"></div>
      <div class="col-md-4"><label class="form-label">SMTP Port</label><input class="form-control" name="smtp_port" value="{{ settings.smtp_port }}"></div>
    </div>
    <button class="btn btn-primary mt-4"><i class="fa-solid fa-floppy-disk"></i> Save Settings</button>
  </form>
</section>
{% endblock %}
